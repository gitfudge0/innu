name: Feature Request
description: Suggest an idea for Innu
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
  
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of what you want
      placeholder: Describe the feature you'd like to see...
    validations:
      required: true
  
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this solve? What use case does it address?
      placeholder: |
        I'm always frustrated when [...]
        This would help me to [...]
    validations:
      required: true
  
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you think this feature should work
      placeholder: Describe your proposed solution...
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: What other approaches have you thought about?
    validations:
      required: false
  
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples about the feature request here
      placeholder: Screenshots, mockups, examples, etc.
    validations:
      required: false