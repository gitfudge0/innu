name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive_suffix: linux-x64
          - target: aarch64-unknown-linux-gnu
            archive_suffix: linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag matches Cargo version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"

          if [[ -z "${cargo_version}" ]]; then
            echo "Failed to read package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${cargo_version}" != "${tag_version}" ]]; then
            echo "Tag version ${tag_version} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="innu-v${version}-${{ matrix.archive_suffix }}.tar.gz"
          staging_dir="dist/staging/${{ matrix.target }}"
          mkdir -p "${staging_dir}"

          install -Dm755 "target/${{ matrix.target }}/release/innu" "${staging_dir}/innu"
          install -Dm644 README.md "${staging_dir}/README.md"
          install -Dm644 LICENSE "${staging_dir}/LICENSE"

          mkdir -p dist
          tar -czf "dist/${archive}" -C "${staging_dir}" .

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          checksum_file="dist/innu-v${version}-checksums.txt"

          (
            cd dist
            sha256sum *.tar.gz > "$(basename "${checksum_file}")"
          )

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*-checksums.txt
